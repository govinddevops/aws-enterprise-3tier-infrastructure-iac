      # в”Ђв”Ђ FINAL SUMMARY в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: "рџ“Љ Post Complete Validation Report to Pull Request"
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const modules = [
              { naRoot Module',             init: '${{ steps.init-root.outcome }}',    validate: '${{ steps.validate-root.outcome }}'    },
              { name: 'modules/vpc',             init: '${{ steps.init-vpc.outcome }}',     validate: '${{ steps.validate-vpc.outcome }}'     },
              { name: 'modules/security_groups', init: '${{ steps.init-sg.outcome }}',      validate: '${{ steps.validate-sg.outcome }}'      },
              { name: 'modules/alb',             init: '${{ steps.init-alb.outcome }}',     validate '${{ steps.validate-alb.outcome }}'     },
              { name: 'modules/iam',             init: '${{ steps.init-iam.outcome }}',     validate: '${{ steps.validate-iam.outcome }}'     },
              { name: 'modules/compute',         init: '${{ steps.init-compute.outcome }}', validate: '${{ steps.validate-compute.outcome }}' },
              { name: 'modules/rds',             init: '${{ steps.init-rds.outcome }}',     validate: '${{ steps.validate-rds.outcome }}'     },
            ];
            const  = o => o === 'success' ? 'вњ…' : o === 'skipped' ? 'вЏ­пёЏ' : 'вќЊ';
            const rows  = modules.map(m =>
              | ${m.name} | ${icon(m.init)} \${m.init}\ | ${icon(m.validate)} \${m.validate}\ |
            ).join('\n');
            const allOk = modules.every(m => m.validate === 'success');
            const body = [
              ## ${allOk ? 'вњ…' : 'вќЊ'} Stage 5 вЂ” Terraform Validate вЂ” ${allOk ? 'ALL PASSED' : 'FAILURES DETECTED'},
              '',
              **Mode:** \-backend=fa\ (zero AWS credentials required),
              **Terraform Version:** \${{ env.TF_VERSION }}\,
              **Commit:** \${{ github.sha }}\,
              '',
              '| Module | Init | Validate |',
              '|--------|------|----------|',
              rows,
              '',
              '---',
              '*Automated validation by Enterprise DevSecOps Pipeline*'
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body:         body
            });

      - name: "рџЏ† Pipeline Final Summary"
        if: always()
        run: |
          echo "в•”в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•—"
