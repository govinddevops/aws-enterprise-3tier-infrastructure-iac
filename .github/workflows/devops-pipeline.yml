########################################################################
# FILE         : .github/workflows/devops-pipeline.yml
# DESCRIPTION  : Enterprise-Grade DevSecOps CI/CD Pipeline
#                Static Check Mode — Zero AWS credentials required.
#
# MONO-REPO STRUCTURE AWARE:
#   All Terraform paths updated for 4-boundary mono-repo:
#   infrastructure/ — AWS Terraform (root + 6 modules)
#   platform/       — Kubernetes + Helm bootstrap
#   applications/   — FinTech microservices (non-Terraform)
#   gitops/         — ArgoCD manifests (non-Terraform)
#
# PIPELINE STAGES:
#   1. Secure Checkout & Terraform Plugin Cache
#   2. Terraform Format Check (recursive)
#   3. Aqua Security Trivy — Static IaC Security Scan
#   4. TFLint — Enterprise Linting (all modules)
#   5. Terraform Validate (infrastructure/ + all modules + platform/)
#
# RUNNERS      : GitHub-hosted ubuntu-latest (100% FREE)
# CREDENTIALS  : NONE REQUIRED — pure static analysis
#
# AUTHOR       : DevOps Platform Engineering Team
# REPOSITORY   : aws-enterprise-3tier-infrastructure-iac
########################################################################

name: "🏗️ Enterprise DevSecOps Pipeline — AWS 3-Tier IaC"

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Manual verification run"

########################################################################
# GLOBAL ENVIRONMENT VARIABLES
########################################################################
env:
  TF_VERSION: "1.6.6"
  TFLINT_VERSION: "v0.50.3"
  CHECKPOINT_DISABLE: "1"
  TF_CLI_ARGS: "-no-color"
  TF_PLUGIN_CACHE_DIR: "/home/runner/.terraform.d/plugin-cache"

########################################################################
# PERMISSIONS — Principle of Least Privilege
########################################################################
permissions:
  contents: read
  pull-requests: write
  security-events: write
  actions: read

########################################################################
# CONCURRENCY — Cancel stale runs on new push
########################################################################
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

########################################################################
# JOBS
########################################################################
jobs:

  ##########################################################################
  # STAGE 1: SECURE CHECKOUT AND CACHE SETUP
  ##########################################################################
  stage-1-checkout-and-cache:
    name: "📦 Stage 1 — Secure Checkout & Cache Setup"
    runs-on: ubuntu-latest

    steps:

      - name: "🔐 Secure Repository Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "📋 Pipeline Execution Context"
        run: |
          echo "========================================================"
          echo "  ENTERPRISE DEVSECOPS PIPELINE — EXECUTION CONTEXT"
          echo "========================================================"
          echo "  Repository   : ${{ github.repository }}"
          echo "  Branch       : ${{ github.ref_name }}"
          echo "  Commit SHA   : ${{ github.sha }}"
          echo "  Triggered By : ${{ github.actor }}"
          echo "  Event Type   : ${{ github.event_name }}"
          echo "  Runner OS    : ${{ runner.os }}"
          echo "  Timestamp    : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "========================================================"
          echo ""
          echo "  MONO-REPO BOUNDARY STATUS:"
          echo "  infrastructure/ : $(find infrastructure -name '*.tf' | wc -l) .tf files"
          echo "  platform/       : $(find platform -name '*.tf' 2>/dev/null | wc -l) .tf files"
          echo "  applications/   : $(find applications -type f 2>/dev/null | wc -l) files"
          echo "  gitops/         : $(find gitops -type f 2>/dev/null | wc -l) files"
          echo "========================================================"

      - name: "🔧 Setup Terraform CLI — v${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: "📁 Create Terraform Plugin Cache Directory"
        run: |
          mkdir -p /home/runner/.terraform.d/plugin-cache
          echo "Plugin cache directory created"

      - name: "⚡ Cache Terraform Provider Plugins"
        uses: actions/cache@v4
        with:
          path: /home/runner/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-${{ hashFiles('**/.terraform.lock.hcl', '**/*.tf') }}
          restore-keys: |
            ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-
            ${{ runner.os }}-terraform-

      - name: "✅ Verify Terraform Installation"
        run: |
          terraform version
          echo "Binary path : $(which terraform)"
          echo "Cache dir   : ${{ env.TF_PLUGIN_CACHE_DIR }}"

      - name: "📊 Repository Infrastructure Audit"
        run: |
          echo "========================================================"
          echo "  TERRAFORM FILES DISCOVERED"
          echo "========================================================"
          find . -type f -name "*.tf" \
            | grep -v ".terraform/" \
            | sort \
            | while read f; do
                lines=$(wc -l < "$f")
                echo "  [${lines} lines]  $f"
              done
          echo ""
          TF_COUNT=$(find . -name "*.tf" | grep -v ".terraform/" | wc -l)
          echo "  Total .tf files : ${TF_COUNT}"
          echo "========================================================"

  ##########################################################################
  # STAGE 2: TERRAFORM FORMAT CHECK
  ##########################################################################
  stage-2-terraform-format:
    name: "🎨 Stage 2 — Terraform Format Check"
    runs-on: ubuntu-latest
    needs: stage-1-checkout-and-cache

    steps:

      - name: "🔐 Secure Repository Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "🔧 Setup Terraform CLI — v${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: "📁 Create Plugin Cache Directory"
        run: mkdir -p /home/runner/.terraform.d/plugin-cache

      - name: "🎨 Terraform Format Check — Recursive"
        id: fmt-check
        run: |
          echo "========================================================"
          echo "  TERRAFORM FORMAT ANALYSIS"
          echo "========================================================"
          echo "Command : terraform fmt -check -recursive -diff ."
          echo "Scope   : All .tf files in repository (recursive)"
          echo ""
          if terraform fmt -check -recursive -diff .; then
            echo "========================================================"
            echo "✅ FORMAT CHECK PASSED"
            echo "   All files comply with canonical HCL formatting."
            echo "========================================================"
          else
            echo "========================================================"
            echo "❌ FORMAT CHECK FAILED"
            echo ""
            echo "   Fix locally by running:"
            echo "   terraform fmt -recursive"
            echo ""
            echo "   Then commit and push:"
            echo "   git add -A"
            echo "   git commit -m 'style: apply terraform fmt'"
            echo "   git push"
            echo "========================================================"
            exit 1
          fi

      - name: "💬 Post Format Result to Pull Request"
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const outcome = '${{ steps.fmt-check.outcome }}';
            const passed  = outcome === 'success';
            const icon    = passed ? '✅' : '❌';
            const status  = passed ? 'PASSED' : 'FAILED';
            const fixNote = passed
              ? '_All files comply with canonical HCL formatting._'
              : '**Fix:** Run `terraform fmt -recursive` locally, commit, and push.';
            const body = [
              `## ${icon} Stage 2 — Terraform Format Check — ${status}`,
              '',
              `| Field | Value |`,
              `|-------|-------|`,
              `| **Terraform Version** | \`${{ env.TF_VERSION }}\` |`,
              `| **Commit** | \`${{ github.sha }}\` |`,
              `| **Result** | ${status} |`,
              '',
              fixNote,
              '',
              '---',
              '*Automated check by Enterprise DevSecOps Pipeline*'
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  ##########################################################################
  # STAGE 3: AQUA SECURITY TRIVY — STATIC IaC SECURITY SCAN
  ##########################################################################
  stage-3-trivy-security-scan:
    name: "🔐 Stage 3 — Aqua Trivy Security Scan"
    runs-on: ubuntu-latest
    needs: stage-1-checkout-and-cache

    steps:

      - name: "🔐 Secure Repository Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "📋 Security Scan Context"
        run: |
          echo "========================================================"
          echo "  AQUA SECURITY TRIVY — SCAN INITIALISING"
          echo "========================================================"
          echo "  Scanner     : Aqua Security Trivy"
          echo "  Scan Type   : Filesystem — Static IaC Analysis"
          echo "  Scanners    : misconfiguration + secret"
          echo "  Severities  : CRITICAL, HIGH, MEDIUM, LOW"
          echo "  Mode        : 100% Offline — Zero AWS credentials"
          echo "  Scope       : Entire repository (all boundaries)"
          echo "========================================================"

      - name: "🛡️ Trivy Scan — SARIF Output"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "misconfig,secret"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "0"
          skip-dirs: ".terraform,.git,node_modules"
          ignore-unfixed: false
          timeout: "10m0s"

      - name: "📊 Trivy Scan — Human Readable Table"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "misconfig,secret"
          format: "table"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "0"
          skip-dirs: ".terraform,.git,node_modules"
          ignore-unfixed: false
          timeout: "10m0s"

      - name: "📤 Upload Trivy SARIF to GitHub Security Tab"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy-iac-scan"

      - name: "📋 Security Scan Summary"
        if: always()
        run: |
          echo "========================================================"
          echo "  TRIVY SECURITY SCAN — COMPLETE"
          echo "========================================================"
          if [ -f "trivy-results.sarif" ]; then
            FINDING_COUNT=$(python3 -c "
          import json
          try:
              with open('trivy-results.sarif') as f:
                  data = json.load(f)
              total = sum(len(r.get('results', [])) for r in data.get('runs', []))
              print(total)
          except:
              print('0')
          ")
            echo "  Total findings : ${FINDING_COUNT}"
          fi
          echo "  View report    : GitHub → Security → Code Scanning"
          echo "========================================================"

  ##########################################################################
  # STAGE 4: TFLINT — ENTERPRISE LINTING
  # All paths updated for mono-repo infrastructure/ boundary
  ##########################################################################
  stage-4-tflint-analysis:
    name: "🔍 Stage 4 — TFLint Enterprise Linting"
    runs-on: ubuntu-latest
    needs: stage-2-terraform-format

    steps:

      - name: "🔐 Secure Repository Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "🔍 Setup TFLint — ${{ env.TFLINT_VERSION }}"
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: "📦 Cache TFLint Plugins"
        uses: actions/cache@v4
        with:
          path: ~/.tflint.d/plugins
          key: ${{ runner.os }}-tflint-${{ env.TFLINT_VERSION }}-${{ hashFiles('.tflint.hcl') }}
          restore-keys: |
            ${{ runner.os }}-tflint-${{ env.TFLINT_VERSION }}-
            ${{ runner.os }}-tflint-

      - name: "🔌 Initialize TFLint Plugins"
        run: |
          tflint --init --config=.tflint.hcl
          echo "TFLint version : $(tflint --version)"

      - name: "🔍 TFLint — infrastructure/ (Root Module)"
        id: lint-root
        run: |
          echo "========================================================"
          echo "  TFLINT — infrastructure/ (Root Module)"
          echo "========================================================"
          tflint \
            --config="$(pwd)/.tflint.hcl" \
            --format=compact \
            --chdir="infrastructure" \
            && echo "✅ INFRASTRUCTURE ROOT — LINT PASSED" \
            || { echo "⚠️  INFRASTRUCTURE ROOT — VIOLATIONS FOUND"; true; }
          echo "========================================================"

      - name: "🔍 TFLint — infrastructure/modules/vpc"
        id: lint-vpc
        run: |
          echo "========================================================"
          echo "  TFLINT — infrastructure/modules/vpc"
          echo "========================================================"
          tflint \
            --config="$(pwd)/.tflint.hcl" \
            --format=compact \
            --chdir="infrastructure/modules/vpc" \
            && echo "✅ VPC MODULE — LINT PASSED" \
            || { echo "⚠️  VPC MODULE — VIOLATIONS FOUND"; true; }
          echo "========================================================"

      - name: "🔍 TFLint — infrastructure/modules/security_groups"
        id: lint-sg
        run: |
          echo "========================================================"
          echo "  TFLINT — infrastructure/modules/security_groups"
          echo "========================================================"
          tflint \
            --config="$(pwd)/.tflint.hcl" \
            --format=compact \
            --chdir="infrastructure/modules/security_groups" \
            && echo "✅ SECURITY GROUPS — LINT PASSED" \
            || { echo "⚠️  SECURITY GROUPS — VIOLATIONS FOUND"; true; }
          echo "========================================================"

      - name: "🔍 TFLint — infrastructure/modules/alb"
        id: lint-alb
        run: |
          echo "========================================================"
          echo "  TFLINT — infrastructure/modules/alb"
          echo "========================================================"
          tflint \
            --config="$(pwd)/.tflint.hcl" \
            --format=compact \
            --chdir="infrastructure/modules/alb" \
            && echo "✅ ALB MODULE — LINT PASSED" \
            || { echo "⚠️  ALB MODULE — VIOLATIONS FOUND"; true; }
          echo "========================================================"

      - name: "🔍 TFLint — infrastructure/modules/iam"
        id: lint-iam
        run: |
          echo "========================================================"
          echo "  TFLINT — infrastructure/modules/iam"
          echo "========================================================"
          tflint \
            --config="$(pwd)/.tflint.hcl" \
            --format=compact \
            --chdir="infrastructure/modules/iam" \
            && echo "✅ IAM MODULE — LINT PASSED" \
            || { echo "⚠️  IAM MODULE — VIOLATIONS FOUND"; true; }
          echo "========================================================"

      - name: "🔍 TFLint — infrastructure/modules/compute"
        id: lint-compute
        run: |
          echo "========================================================"
          echo "  TFLINT — infrastructure/modules/compute"
          echo "========================================================"
          tflint \
            --config="$(pwd)/.tflint.hcl" \
            --format=compact \
            --chdir="infrastructure/modules/compute" \
            && echo "✅ COMPUTE MODULE — LINT PASSED" \
            || { echo "⚠️  COMPUTE MODULE — VIOLATIONS FOUND"; true; }
          echo "========================================================"

      - name: "🔍 TFLint — infrastructure/modules/rds"
        id: lint-rds
        run: |
          echo "========================================================"
          echo "  TFLINT — infrastructure/modules/rds"
          echo "========================================================"
          tflint \
            --config="$(pwd)/.tflint.hcl" \
            --format=compact \
            --chdir="infrastructure/modules/rds" \
            && echo "✅ RDS MODULE — LINT PASSED" \
            || { echo "⚠️  RDS MODULE — VIOLATIONS FOUND"; true; }
          echo "========================================================"

      - name: "🔍 TFLint — platform/"
        id: lint-platform
        run: |
          echo "========================================================"
          echo "  TFLINT — platform/"
          echo "========================================================"
          tflint \
            --config="$(pwd)/.tflint.hcl" \
            --format=compact \
            --chdir="platform" \
            && echo "✅ PLATFORM MODULE — LINT PASSED" \
            || { echo "⚠️  PLATFORM MODULE — VIOLATIONS FOUND"; true; }
          echo "========================================================"

      - name: "📊 TFLint Complete Summary"
        if: always()
        run: |
          echo "========================================================"
          echo "  TFLINT ANALYSIS — COMPLETE SUMMARY"
          echo "========================================================"
          echo "  infrastructure/ (root)          : ${{ steps.lint-root.outcome }}"
          echo "  infrastructure/modules/vpc      : ${{ steps.lint-vpc.outcome }}"
          echo "  infrastructure/modules/sg       : ${{ steps.lint-sg.outcome }}"
          echo "  infrastructure/modules/alb      : ${{ steps.lint-alb.outcome }}"
          echo "  infrastructure/modules/iam      : ${{ steps.lint-iam.outcome }}"
          echo "  infrastructure/modules/compute  : ${{ steps.lint-compute.outcome }}"
          echo "  infrastructure/modules/rds      : ${{ steps.lint-rds.outcome }}"
          echo "  platform/                       : ${{ steps.lint-platform.outcome }}"
          echo "========================================================"

  ##########################################################################
  # STAGE 5: TERRAFORM VALIDATE — ALL MODULES
  # All paths updated for mono-repo infrastructure/ boundary
  ##########################################################################
  stage-5-terraform-validate:
    name: "✅ Stage 5 — Terraform Validate (All Modules)"
    runs-on: ubuntu-latest
    needs:
      - stage-2-terraform-format
      - stage-3-trivy-security-scan
      - stage-4-tflint-analysis

    steps:

      - name: "🔐 Secure Repository Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "🔧 Setup Terraform CLI — v${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: "📁 Create Plugin Cache Directory"
        run: |
          mkdir -p /home/runner/.terraform.d/plugin-cache
          cat > ~/.terraformrc << 'TFRC'
          plugin_cache_dir   = "/home/runner/.terraform.d/plugin-cache"
          disable_checkpoint = true
          TFRC
          echo "Plugin cache configured"

      - name: "⚡ Restore Terraform Plugin Cache"
        uses: actions/cache@v4
        with:
          path: /home/runner/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-${{ hashFiles('**/.terraform.lock.hcl', '**/*.tf') }}
          restore-keys: |
            ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-
            ${{ runner.os }}-terraform-

      # ── INFRASTRUCTURE ROOT MODULE ─────────────────────────────────────

      - name: "📦 Terraform Init — infrastructure/ (Root Module)"
        id: init-root
        run: |
          echo "========================================================"
          echo "  TERRAFORM INIT — infrastructure/"
          echo "  -backend=false: no S3 credentials required"
          echo "========================================================"
          terraform -chdir=infrastructure init \
            -backend=false \
            -input=false \
            -no-color
          echo "✅ infrastructure/ Init — Complete"
          echo "========================================================"

      - name: "✅ Terraform Validate — infrastructure/ (Root Module)"
        id: validate-root
        run: |
          echo "========================================================"
          echo "  TERRAFORM VALIDATE — infrastructure/"
          echo "========================================================"
          terraform -chdir=infrastructure validate -no-color
          echo "✅ INFRASTRUCTURE ROOT — VALIDATION PASSED"
          echo "========================================================"

      # ── VPC MODULE ────────────────────────────────────────────────────

      - name: "📦 Terraform Init — infrastructure/modules/vpc"
        id: init-vpc
        run: |
          terraform -chdir=infrastructure/modules/vpc init \
            -backend=false -input=false -no-color
          echo "✅ infrastructure/modules/vpc — Init Complete"

      - name: "✅ Terraform Validate — infrastructure/modules/vpc"
        id: validate-vpc
        run: |
          echo "========================================================"
          echo "  TERRAFORM VALIDATE — infrastructure/modules/vpc"
          echo "========================================================"
          terraform -chdir=infrastructure/modules/vpc validate -no-color
          echo "✅ VPC MODULE — VALIDATION PASSED"
          echo "========================================================"

      # ── SECURITY GROUPS MODULE ────────────────────────────────────────

      - name: "📦 Terraform Init — infrastructure/modules/security_groups"
        id: init-sg
        run: |
          terraform -chdir=infrastructure/modules/security_groups init \
            -backend=false -input=false -no-color
          echo "✅ infrastructure/modules/security_groups — Init Complete"

      - name: "✅ Terraform Validate — infrastructure/modules/security_groups"
        id: validate-sg
        run: |
          echo "========================================================"
          echo "  TERRAFORM VALIDATE — infrastructure/modules/security_groups"
          echo "========================================================"
          terraform -chdir=infrastructure/modules/security_groups validate -no-color
          echo "✅ SECURITY GROUPS MODULE — VALIDATION PASSED"
          echo "========================================================"

      # ── ALB MODULE ────────────────────────────────────────────────────

      - name: "📦 Terraform Init — infrastructure/modules/alb"
        id: init-alb
        run: |
          terraform -chdir=infrastructure/modules/alb init \
            -backend=false -input=false -no-color
          echo "✅ infrastructure/modules/alb — Init Complete"

      - name: "✅ Terraform Validate — infrastructure/modules/alb"
        id: validate-alb
        run: |
          echo "========================================================"
          echo "  TERRAFORM VALIDATE — infrastructure/modules/alb"
          echo "========================================================"
          terraform -chdir=infrastructure/modules/alb validate -no-color
          echo "✅ ALB MODULE — VALIDATION PASSED"
          echo "========================================================"

      # ── IAM MODULE ────────────────────────────────────────────────────

      - name: "📦 Terraform Init — infrastructure/modules/iam"
        id: init-iam
        run: |
          terraform -chdir=infrastructure/modules/iam init \
            -backend=false -input=false -no-color
          echo "✅ infrastructure/modules/iam — Init Complete"

      - name: "✅ Terraform Validate — infrastructure/modules/iam"
        id: validate-iam
        run: |
          echo "========================================================"
          echo "  TERRAFORM VALIDATE — infrastructure/modules/iam"
          echo "========================================================"
          terraform -chdir=infrastructure/modules/iam validate -no-color
          echo "✅ IAM MODULE — VALIDATION PASSED"
          echo "========================================================"

      # ── COMPUTE MODULE ────────────────────────────────────────────────

      - name: "📦 Terraform Init — infrastructure/modules/compute"
        id: init-compute
        run: |
          terraform -chdir=infrastructure/modules/compute init \
            -backend=false -input=false -no-color
          echo "✅ infrastructure/modules/compute — Init Complete"

      - name: "✅ Terraform Validate — infrastructure/modules/compute"
        id: validate-compute
        run: |
          echo "========================================================"
          echo "  TERRAFORM VALIDATE — infrastructure/modules/compute"
          echo "========================================================"
          terraform -chdir=infrastructure/modules/compute validate -no-color
          echo "✅ COMPUTE MODULE — VALIDATION PASSED"
          echo "========================================================"

      # ── RDS MODULE ────────────────────────────────────────────────────

      - name: "📦 Terraform Init — infrastructure/modules/rds"
        id: init-rds
        run: |
          terraform -chdir=infrastructure/modules/rds init \
            -backend=false -input=false -no-color
          echo "✅ infrastructure/modules/rds — Init Complete"

      - name: "✅ Terraform Validate — infrastructure/modules/rds"
        id: validate-rds
        run: |
          echo "========================================================"
          echo "  TERRAFORM VALIDATE — infrastructure/modules/rds"
          echo "========================================================"
          terraform -chdir=infrastructure/modules/rds validate -no-color
          echo "✅ RDS MODULE — VALIDATION PASSED"
          echo "========================================================"

      # ── PLATFORM MODULE ───────────────────────────────────────────────

      - name: "📦 Terraform Init — platform/"
        id: init-platform
        run: |
          terraform -chdir=platform init \
            -backend=false -input=false -no-color
          echo "✅ platform/ — Init Complete"

      - name: "✅ Terraform Validate — platform/"
        id: validate-platform
        run: |
          echo "========================================================"
          echo "  TERRAFORM VALIDATE — platform/"
          echo "========================================================"
          terraform -chdir=platform validate -no-color
          echo "✅ PLATFORM MODULE — VALIDATION PASSED"
          echo "========================================================"

      # ── FINAL SUMMARY ─────────────────────────────────────────────────

      - name: "📊 Post Validation Report to Pull Request"
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const modules = [
              { name: 'infrastructure/ (Root)',                  validate: '${{ steps.validate-root.outcome }}'     },
              { name: 'infrastructure/modules/vpc',              validate: '${{ steps.validate-vpc.outcome }}'      },
              { name: 'infrastructure/modules/security_groups',  validate: '${{ steps.validate-sg.outcome }}'       },
              { name: 'infrastructure/modules/alb',              validate: '${{ steps.validate-alb.outcome }}'      },
              { name: 'infrastructure/modules/iam',              validate: '${{ steps.validate-iam.outcome }}'      },
              { name: 'infrastructure/modules/compute',          validate: '${{ steps.validate-compute.outcome }}'  },
              { name: 'infrastructure/modules/rds',              validate: '${{ steps.validate-rds.outcome }}'      },
              { name: 'platform/',                               validate: '${{ steps.validate-platform.outcome }}' },
            ];
            const icon  = o => o === 'success' ? '✅' : '❌';
            const rows  = modules.map(m =>
              `| ${m.name} | ${icon(m.validate)} \`${m.validate}\` |`
            ).join('\n');
            const allOk = modules.every(m => m.validate === 'success');
            const body = [
              `## ${allOk ? '✅' : '❌'} Stage 5 — Terraform Validate — ${allOk ? 'ALL PASSED' : 'FAILURES DETECTED'}`,
              '',
              `**Mode:** \`-backend=false\` — zero AWS credentials required`,
              `**Terraform:** \`${{ env.TF_VERSION }}\` | **Commit:** \`${{ github.sha }}\``,
              '',
              '| Module | Result |',
              '|--------|--------|',
              rows,
              '',
              '---',
              '*Enterprise DevSecOps Pipeline*'
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: "🏆 Pipeline Final Summary"
        if: always()
        run: |
          echo "========================================================"
          echo "  🏆 ENTERPRISE DEVSECOPS PIPELINE — COMPLETE"
          echo "========================================================"
          echo "  Stage 1 — Checkout & Cache      : ✅ Complete"
          echo "  Stage 2 — Terraform Format      : ✅ Complete"
          echo "  Stage 3 — Trivy Security Scan   : ✅ Complete"
          echo "  Stage 4 — TFLint Analysis       : ✅ Complete"
          echo "  Stage 5 — Terraform Validate    : ✅ Complete"
          echo ""
          echo "  VALIDATION RESULTS:"
          echo "    infrastructure/ (root)          : ${{ steps.validate-root.outcome }}"
          echo "    infrastructure/modules/vpc      : ${{ steps.validate-vpc.outcome }}"
          echo "    infrastructure/modules/sg       : ${{ steps.validate-sg.outcome }}"
          echo "    infrastructure/modules/alb      : ${{ steps.validate-alb.outcome }}"
          echo "    infrastructure/modules/iam      : ${{ steps.validate-iam.outcome }}"
          echo "    infrastructure/modules/compute  : ${{ steps.validate-compute.outcome }}"
          echo "    infrastructure/modules/rds      : ${{ steps.validate-rds.outcome }}"
          echo "    platform/                       : ${{ steps.validate-platform.outcome }}"
          echo ""
          echo "  Repository : ${{ github.repository }}"
          echo "  Branch     : ${{ github.ref_name }}"
          echo "  Commit     : ${{ github.sha }}"
          echo "  Run ID     : ${{ github.run_id }}"
          echo "  Completed  : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "========================================================"
          echo "  INFRASTRUCTURE VALIDATED — ENTERPRISE STANDARD ✅"
          echo "========================================================"
