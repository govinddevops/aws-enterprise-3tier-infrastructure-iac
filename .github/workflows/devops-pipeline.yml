name: "🏗️ Enterprise DevSecOps Pipeline — AWS 3-Tier IaC"

on:
  push:
    branches:
      - main
      - master
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".tflint.hcl"
      - ".trivyignore"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".tflint.hcl"
      - ".trivyignore"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual pipeline trigger"
        required: false
        default: "Manual verification run"

env:
  TF_VERSION: "1.6.6"
  TFLINT_VERSION: "v0.50.3"
  CHECKPOINT_DISABLE: "1"
  TF_CLI_ARGS: "-no-color"
  TF_PLUGIN_CACHE_DIR: "${{ github.workspace }}/.terraform.d/plugin-cache"

permissions:
  contents: read
  pull-requests: write
  security-events: write
  actions: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:

  stage-1-checkout-and-cache:
    name: "📦 Stage 1 — Secure Checkout & Cache Setup"
    runs-on: ubuntu-latest
    outputs:
      terraform-cache-hit: ${{ steps.terraform-cache.outputs.cache-hit }}
    steps:
      - name: "🔐 Secure Repository Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "📋 Pipeline Execution Context"
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║         ENTERPRISE DEVSECOPS PIPELINE                ║"
          echo "║         EXECUTION CONTEXT REPORT                     ║"
          echo "╚══════════════════════════════════════════════════════╝"
          echo ""
          echo "  Repository   : ${{ github.repository }}"
          echo "  Branch       : ${{ github.ref_name }}"
          echo "  Commit SHA   : ${{ github.sha }}"
          echo "  Triggered By : ${{ github.actor }}"
          echo "  Event Type   : ${{ github.event_name }}"
          echo "  Runner OS    : ${{ runner.os }}"
          echo "  Runner Arch  : ${{ runner.arch }}"
          echo "  Workspace    : ${{ github.workspace }}"
          echo "  Timestamp    : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "  Manual Reason: ${{ github.event.inputs.reason }}"
          fi
          echo "══════════════════════════════════════════════════════"

      - name: "🔧 Setup Terraform CLI — v${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: "📁 Create Terraform Plugin Cache Directory"
        run: |
          mkdir -p ${{ env.TF_PLUGIN_CACHE_DIR }}

      - name: "⚡ Cache Terraform Provider Plugins"
        id: terraform-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.TF_PLUGIN_CACHE_DIR }}
            ~/.terraform.d
          key: ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-${{ hashFiles('**/.terraform.lock.hcl', '**/*.tf') }}
          restore-keys: |
            ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-
            ${{ runner.os }}-terraform-

      - name: "✅ Verify Terraform Installation"
        run: |
          terraform version
          echo "Cache hit: ${{ steps.terraform-cache.outputs.cache-hit }}"

      - name: "📊 Repository Infrastructure Audit"
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║          REPOSITORY STRUCTURE AUDIT                  ║"
          echo "╚══════════════════════════════════════════════════════╝"
          echo ""
          find . -type f -name "*.tf" | grep -v ".terraform/" | sort | while read f; do
            size=$(wc -l < "$f")
            echo "  [${size} lines]  $f"
          done
          echo ""
          TF_FILE_COUNT=$(find . -name "*.tf" | grep -v ".terraform/" | wc -l)
          TFVARS_COUNT=$(find . -name "*.tfvars" | grep -v ".terraform/" | wc -l)
          MODULE_COUNT=$(find ./modules -maxdepth 1 -mindepth 1 -type d | wc -l)
          echo "Summary:"
          echo "  Total .tf files    : ${TF_FILE_COUNT}"
          echo "  Total .tfvars files: ${TFVARS_COUNT}"
          echo "  Custom modules     : ${MODULE_COUNT}"
          echo "══════════════════════════════════════════════════════"

  stage-2-terraform-format:
    name: "🎨 Stage 2 — Terraform Format Check"
    runs-on: ubuntu-latest
    needs: stage-1-checkout-and-cache
    steps:
      - name: "🔐 Secure Repository Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "🔧 Setup Terraform CLI — v${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: "🎨 Terraform Format Check — Recursive"
        id: fmt-check
        run: |
          if terraform fmt -check -recursive -diff .; then
            echo "✅ FORMAT CHECK PASSED"
          else
            echo "❌ FORMAT CHECK FAILED"
            exit 1
          fi

      - name: "💬 Post Format Result to Pull Request"
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const outcome = '${{ steps.fmt-check.outcome }}';
            const passed  = outcome === 'success';
            const icon    = passed ? '✅' : '❌';
            const status  = passed ? 'PASSED' : 'FAILED';
            const body = [
              `## ${icon} Stage 2 — Terraform Format Check — ${status}`,
              `| Field | Value |`,
              `|---|---|`,
              `| **Terraform Version** | \`${{ env.TF_VERSION }}\` |`,
              `| **Scope** | Recursive — all \`.tf\` files |`,
              `| **Result** | ${status} |`
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body:         body
            });

  stage-3-trivy-security-scan:
    name: "🔐 Stage 3 — Aqua Trivy Security Scan"
    runs-on: ubuntu-latest
    needs: stage-1-checkout-and-cache
    steps:
      - name: "🔐 Secure Repository Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "🛡️ Trivy Scan — SARIF Output"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "misconfig,secret"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "0"
          skip-dirs: ".terraform,.git,node_modules"
          ignore-unfixed: false
          timeout: "10m0s"

      - name: "📊 Trivy Scan — Human Readable Table Output"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "misconfig,secret"
          format: "table"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "0"
          skip-dirs: ".terraform,.git,node_modules"
          ignore-unfixed: false
          timeout: "10m0s"

      - name: "📤 Upload Trivy SARIF to GitHub Security Tab"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy-iac-misconfiguration-scan"

  stage-4-tflint-analysis:
    name: "🔍 Stage 4 — TFLint Enterprise Linting"
    runs-on: ubuntu-latest
    needs: stage-2-terraform-format
    steps:
      - name: "🔐 Secure Repository Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "🔍 Setup TFLint — ${{ env.TFLINT_VERSION }}"
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: "📦 Cache TFLint AWS Ruleset Plugin"
        uses: actions/cache@v4
        with:
          path: ~/.tflint.d/plugins
          key: ${{ runner.os }}-tflint-${{ env.TFLINT_VERSION }}-${{ hashFiles('.tflint.hcl') }}
          restore-keys: |
            ${{ runner.os }}-tflint-${{ env.TFLINT_VERSION }}-

      - name: "🔌 Initialize TFLint — Download AWS Ruleset"
        run: tflint --init --config=.tflint.hcl

      - name: "🔍 TFLint — Root Module"
        id: lint-root
        run: tflint --config="$(pwd)/.tflint.hcl" --format=compact --chdir="." || echo "Violation found"

      - name: "🔍 TFLint — modules/vpc"
        id: lint-vpc
        run: tflint --config="$(pwd)/.tflint.hcl" --format=compact --chdir="modules/vpc" || echo "Violation found"

      - name: "🔍 TFLint — modules/security_groups"
        id: lint-sg
        run: tflint --config="$(pwd)/.tflint.hcl" --format=compact --chdir="modules/security_groups" || echo "Violation found"

      - name: "🔍 TFLint — modules/alb"
        id: lint-alb
        run: tflint --config="$(pwd)/.tflint.hcl" --format=compact --chdir="modules/alb" || echo "Violation found"

      - name: "🔍 TFLint — modules/iam"
        id: lint-iam
        run: tflint --config="$(pwd)/.tflint.hcl" --format=compact --chdir="modules/iam" || echo "Violation found"

      - name: "🔍 TFLint — modules/compute"
        id: lint-compute
        run: tflint --config="$(pwd)/.tflint.hcl" --format=compact --chdir="modules/compute" || echo "Violation found"

      - name: "🔍 TFLint — modules/rds"
        id: lint-rds
        run: tflint --config="$(pwd)/.tflint.hcl" --format=compact --chdir="modules/rds" || echo "Violation found"

  stage-5-terraform-validate:
    name: "✅ Stage 5 — Terraform Validate (All Modules)"
    runs-on: ubuntu-latest
    needs:
      - stage-2-terraform-format
      - stage-3-trivy-security-scan
      - stage-4-tflint-analysis
    steps:
      - name: "🔐 Secure Repository Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "🔧 Setup Terraform CLI — v${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: "⚡ Restore Terraform Plugin Cache"
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.TF_PLUGIN_CACHE_DIR }}
            ~/.terraform.d
          key: ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-${{ hashFiles('**/.terraform.lock.hcl', '**/*.tf') }}
          restore-keys: |
            ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-

      - name: "📁 Configure Terraform Plugin Cache Path"
        run: |
          mkdir -p ${{ env.TF_PLUGIN_CACHE_DIR }}
          cat > ~/.terraformrc << 'TFRC'
          plugin_cache_dir   = "$HOME/.terraform.d/plugin-cache"
          disable_checkpoint = true
          TFRC

      - name: "📦 Terraform Init — Root Module"
        id: init-root
        run: terraform init -backend=false -input=false -no-color

      - name: "✅ Terraform Validate — Root Module"
        id: validate-root
        run: terraform validate -no-color

      - name: "📦 Terraform Init — modules/vpc"
        id: init-vpc
        run: terraform -chdir=modules/vpc init -backend=false -input=false -no-color

      - name: "✅ Terraform Validate — modules/vpc"
        id: validate-vpc
        run: terraform -chdir=modules/vpc validate -no-color

      - name: "📦 Terraform Init — modules/security_groups"
        id: init-sg
        run: terraform -chdir=modules/security_groups init -backend=false -input=false -no-color

      - name: "✅ Terraform Validate — modules/security_groups"
        id: validate-sg
        run: terraform -chdir=modules/security_groups validate -no-color

      - name: "📦 Terraform Init — modules/alb"
        id: init-alb
        run: terraform -chdir=modules/alb init -backend=false -input=false -no-color

      - name: "✅ Terraform Validate — modules/alb"
        id: validate-alb
        run: terraform -chdir=modules/alb validate -no-color

      - name: "📦 Terraform Init — modules/iam"
        id: init-iam
        run: terraform -chdir=modules/iam init -backend=false -input=false -no-color

      - name: "✅ Terraform Validate — modules/iam"
        id: validate-iam
        run: terraform -chdir=modules/iam validate -no-color

      - name: "📦 Terraform Init — modules/compute"
        id: init-compute
        run: terraform -chdir=modules/compute init -backend=false -input=false -no-color

      - name: "✅ Terraform Validate — modules/compute"
        id: validate-compute
        run: terraform -chdir=modules/compute validate -no-color

      - name: "📦 Terraform Init — modules/rds"
        id: init-rds
        run: terraform -chdir=modules/rds init -backend=false -input=false -no-color

      - name: "✅ Terraform Validate — modules/rds"
        id: validate-rds
        run: terraform -chdir=modules/rds validate -no-color

      - name: "📊 Post Complete Validation Report to Pull Request"
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const modules = [
              { name: 'Root Module',             init: '${{ steps.init-root.outcome }}',    validate: '${{ steps.validate-root.outcome }}'    },
              { name: 'modules/vpc',             init: '${{ steps.init-vpc.outcome }}',     validate: '${{ steps.validate-vpc.outcome }}'     },
              { name: 'modules/security_groups', init: '${{ steps.init-sg.outcome }}',      validate: '${{ steps.validate-sg.outcome }}'      },
              { name: 'modules/alb',             init: '${{ steps.init-alb.outcome }}',     validate: '${{ steps.validate-alb.outcome }}'     },
              { name: 'modules/iam',             init: '${{ steps.init-iam.outcome }}',     validate: '${{ steps.validate-iam.outcome }}'     },
              { name: 'modules/compute',         init: '${{ steps.init-compute.outcome }}', validate: '${{ steps.validate-compute.outcome }}' },
              { name: 'modules/rds',             init: '${{ steps.init-rds.outcome }}',     validate: '${{ steps.validate-rds.outcome }}'     },
            ];
            const icon  = o => o === 'success' ? '✅' : o === 'skipped' ? '⏭️' : '❌';
            const rows  = modules.map(m => `| ${m.name} | ${icon(m.init)} \`${m.init}\` | ${icon(m.validate)} \`${m.validate}\` |`).join('\n');
            const allOk = modules.every(m => m.validate === 'success');
            const body = [
              `## ${allOk ? '✅' : '❌'} Stage 5 — Terraform Validate — ${allOk ? 'ALL PASSED' : 'FAILURES DETECTED'}`,
              `**Terraform Version:** \`${{ env.TF_VERSION }}\``,
              '| Module | Init | Validate |',
              '|---|---|---|',
              rows
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body:         body
            });

      - name: "🏆 Pipeline Final Summary"
        if: always()
        run: |
          echo "======================================================="
          echo "   🏆 ENTERPRISE DEVSECOPS PIPELINE — COMPLETE       "
          echo "======================================================="
